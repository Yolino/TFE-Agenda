name: Tests

# Lance la suite PHPUnit à chaque push sur "main" et à chaque Pull Request.
# Couplé à la protection de branche GitHub (voir README/section CI), ce workflow
# garantit qu'aucun code ne peut être fusionné tant que les tests ne sont pas au vert.
on:
  push:
    branches: [ main ]
  pull_request:

# Annule une exécution précédente encore en cours sur la même branche/PR.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.4' ]

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # pdo_sqlite + sqlite3 : la suite tourne entièrement sur SQLite en
          # mémoire, donc aucun service MySQL n'est nécessaire dans le CI.
          extensions: mbstring, dom, xml, bcmath, curl, pdo, pdo_sqlite, sqlite3, gd, zip, fileinfo
          coverage: none
          tools: composer:v2

      - name: Cache des dépendances Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Préparation du fichier d'environnement
        run: cp .env.example .env

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Génération de la clé applicative
        run: php artisan key:generate

      - name: Exécution de la suite de tests
        run: vendor/bin/phpunit
